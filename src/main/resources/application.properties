spring.application.name=havenly-stays
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/havenly_stays
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

app.jwt.secret=havenlySecretKeyForJwtTokenGeneration_change_this_in_prod
app.jwt.expiration-seconds=900
app.jwt.refresh-expiration-seconds=604800
