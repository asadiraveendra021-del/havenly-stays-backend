spring.application.name=havenly-stays
server.port=${PORT:8080}
logging.level.org.springframework.boot.web=DEBUG
spring.profiles.active=prod
# ===============================
# DATABASE (Supabase - Transaction Pooler)
# ===============================
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require
spring.datasource.username=postgres.xutmnrjeljnhvilfpsim
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari (Connection Pool)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.datasource.hikari.auto-commit=false
spring.jpa.packages-to-scan=com.asadi.havenly_stays.entity,com.hotelbooking.entity

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ===============================
# JWT CONFIG
# ===============================
app.jwt.secret=havenlySecretKeyForJwtTokenGeneration_change_this_in_prod
app.jwt.expiration-seconds=900
app.jwt.refresh-expiration-seconds=604800

# ===============================
# SUPABASE (Storage)
# ===============================
app.supabase.url=https://xutmnrjeljnhvilfpsim.supabase.co
app.supabase.service-key=${SUPABASE_KEY}
app.supabase.bucket=hotel-images
